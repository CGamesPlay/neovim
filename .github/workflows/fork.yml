name: fork

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BIN_DIR: ${{ github.workspace }}/bin
  BUILD_DIR: ${{ github.workspace }}/build
  INSTALL_PREFIX: ${{ github.workspace }}/nvim-install

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            wasmtime_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            wasmtime_arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Install pre-built wasmtime C API
        run: |
          mkdir -p /tmp/wasmtime-sdk
          curl -sL "https://github.com/bytecodealliance/wasmtime/releases/download/v36.0.9/wasmtime-v36.0.9-${{ matrix.wasmtime_arch }}-linux-c-api.tar.xz" \
            | tar -xJf - --strip-components=1 -C /tmp/wasmtime-sdk
          sudo cp -r /tmp/wasmtime-sdk/include/. /usr/local/include/
          sudo install -m 644 /tmp/wasmtime-sdk/lib/libwasmtime.a /usr/local/lib/

      - name: Build third-party deps with wasmtime
        run: |
          cmake -S cmake.deps -B .deps -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D ENABLE_WASMTIME=ON \
            -D USE_BUNDLED_WASMTIME=OFF
          cmake --build .deps

      - name: Build neovim
        run: |
          cmake -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D ENABLE_WASMTIME=ON \
            -D CI_BUILD=ON
          cmake --build build

      - name: Run unit tests
        run: cmake --build build --target unittest

      - name: Package
        run: cpack --config build/CPackConfig.cmake -G TGZ

      - uses: actions/upload-artifact@v4
        with:
          name: nvim-linux-${{ matrix.arch }}
          path: build/nvim-linux-${{ matrix.arch }}.tar.gz
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          notes="Rolling release — updated on every push to master."
          gh release create latest \
            --title "Latest Build" \
            --notes "$notes" \
            --prerelease \
            nvim-linux-x86_64/*.tar.gz \
            nvim-linux-arm64/*.tar.gz \
            2>/dev/null || \
          (gh release upload latest \
            nvim-linux-x86_64/*.tar.gz \
            nvim-linux-arm64/*.tar.gz \
            --clobber && \
          gh release edit latest --notes "$notes")
